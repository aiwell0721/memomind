# MemoMind Docker Compose
# 一键部署团队知识库系统
# 
# 使用方式：
#   docker-compose up -d
#   docker-compose logs -f

version: '3.8'

services:
  memomind:
    build: .
    container_name: memomind
    restart: unless-stopped
    ports:
      - "${MEMOMIND_PORT:-8000}:8000"   # REST API + Swagger
      - "${MEMOMIND_MCP_PORT:-8001}:8001"  # MCP Server (HTTP mode)
    volumes:
      - memomind_data:/data/memomind
      - memomind_backups:/data/backups
    environment:
      - MEMOMIND_DB_PATH=/data/memomind/memomind.db
      - MEMOMIND_BACKUP_DIR=/data/backups
      - MEMOMIND_API_KEY=${MEMOMIND_API_KEY:-}  # Optional API key for authentication
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - memomind_network

  # Optional: Nginx reverse proxy with HTTPS
  # Uncomment to enable HTTPS with Let's Encrypt
  # nginx:
  #   image: nginx:alpine
  #   container_name: memomind-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/conf.d/default.conf
  #     - ./certs:/etc/nginx/certs
  #   depends_on:
  #     - memomind
  #   networks:
  #     - memomind_network

volumes:
  memomind_data:
    driver: local
  memomind_backups:
    driver: local

networks:
  memomind_network:
    driver: bridge
